<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>💖 Para Ti 💖 by TuMario</title>
  <link rel="stylesheet" href="./style.css">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Indie+Flower" rel="stylesheet">
</head>

<body>
  <div class="bg-particle p1"></div>
  <div class="bg-particle p2"></div>
  <div class="bg-particle p3"></div>
  <div class="bg-particle p4"></div>
  <div class="bg-particle p5"></div>
  <div class="bg-particle p6"></div>
  <div class="bg-particle p7"></div>
  <div class="bg-particle p8"></div>
  <div class="bg-particle p9"></div>
  <div class="bg-particle p10"></div>
  <div class="bg-particle p11"></div>
  <div class="bg-particle p12"></div>
  <div class="bg-particle p13"></div>
  <div class="bg-particle p14"></div>
  <div class="bg-particle p15"></div>
  <div class="bg-particle p16"></div>
  <div class="bg-particle p17"></div>
  <div class="bg-particle p18"></div>
  <div class="bg-particle p19"></div>
  <div class="bg-particle p20"></div>
  <div class="bg-particle p21"></div>
  <div class="bg-particle p22"></div>
  <div class="bg-particle p23"></div>
  <div class="bg-particle p24"></div>
  <div class="bg-particle p25"></div>
  <div class="bg-particle p26"></div>
  <div class="bg-particle p27"></div>
  <div class="bg-particle p28"></div>
  <div class="bg-particle p29"></div>
  <div class="bg-particle p30"></div>

  <div class="present">
    
    <div class="love-msg msg-1">Te Amo ❤️</div>
    <div class="love-msg msg-2">Eres mi todo 💖</div>
    <div class="love-msg msg-3">Siempre juntos 😁</div>
    <div class="love-msg msg-4">Me encantas✨</div>
    <div class="love-msg msg-5">Gracias por existir 🌹</div>
    <div class="love-msg msg-6">Me haces feliz 😊</div>
    <div class="love-msg msg-7">Mi Reina! 💌</div>
    <div class="love-msg msg-8">Hermosa 😍</div>
    
    <div class="ribbon">
      <div class="ribbon-line-left"></div>
      <div class="ribbon-line-right"></div>
      <div class="ribbon-part-left"></div>
      <div class="ribbon-part-right"></div>
      <div class="ribbon-cut-out"></div>
    </div>

    <div class="teddy-bear">
      <div class="bear-left-ear"></div>
      <div class="bear-right-ear"></div>
      <div class="bear-left-eye"></div>
      <div class="bear-right-eye"></div>
      <div class="bear-nose"></div>
      <div class="bear-mouth"></div>
    </div>

    <div class="box-lid">
      <div class="box-top-lid"></div>
      <div class="box-left-lid"></div>
      <div class="box-front-lid"></div>
      <div class="box-right-lid"></div>
      <div class="box-back-lid"></div>
    </div>

    <div class="box">
      <div class="box-left"></div>
      <div class="box-front"></div>
    </div>
    <div class="back-box-cover">
      <div class="box-right"></div>
      <div class="box-back"></div>
    </div>
    
    <div class="deco-heart heart-left"></div>
    <div class="deco-heart heart-right"></div>
  </div>

  <h1 class="main-title">Te amo mucho mi amor.  😍</h1>

  <script>
    const present = document.querySelector('.present');
    let regaloAbierto = false; 

    present.addEventListener('click', () => {
      if (regaloAbierto === false) { 
        present.classList.add('open');
        regaloAbierto = true; 
      }
    });
  </script>

</body>
</html>
